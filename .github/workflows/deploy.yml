name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Sudoku.Server/Sudoku.Server.csproj

      - name: Build
        run: dotnet build Sudoku.Server/Sudoku.Server.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish Sudoku.Server/Sudoku.Server.csproj -c Release --no-restore -o ./publish

      - name: Build Docker image
        run: docker build -t sudoku-web .
