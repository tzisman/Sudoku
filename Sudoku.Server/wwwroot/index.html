<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySudoku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C71585'/><text x='50' y='68' text-anchor='middle' font-size='52' fill='white' font-family='sans-serif'>9</text></svg>">
    <link rel="stylesheet" href="css/site.css?v=11">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1 class="logo"><span class="logo-my">My</span><span class="logo-sudoku">Sudoku</span></h1>
        </div>
    </header>

    <main class="main">
        <section class="board-section">
            <div class="grid-wrapper">
                <div id="puzzle-grid" class="sudoku-grid" aria-label="Sudoku puzzle"></div>
                <div id="loading" class="loading hidden" aria-live="polite">
                    <div class="spinner"></div>
                    <span id="loading-text">working...</span>
                </div>
            </div>

            <div id="solution-section" class="solution-section hidden">
                <p class="section-label">solution</p>
                <div class="grid-wrapper grid-wrapper--solution">
                    <div id="solution-grid" class="sudoku-grid sudoku-grid--readonly" aria-label="Sudoku solution"></div>
                </div>
            </div>

            <p id="status" class="status" aria-live="polite"></p>
        </section>
    </main>

    <button type="button" id="panel-toggle" class="panel-tab" aria-expanded="false" aria-controls="side-panel" aria-label="Open menu">
        <svg class="panel-tab__icon panel-tab__icon--open" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="4" y="6" width="16" height="2.5" rx="1.25" fill="currentColor"/>
            <rect x="4" y="11" width="16" height="2.5" rx="1.25" fill="currentColor"/>
            <rect x="4" y="16" width="16" height="2.5" rx="1.25" fill="currentColor"/>
        </svg>
        <svg class="panel-tab__icon panel-tab__icon--close" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 5l8 7-8 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div id="panel-backdrop" class="panel-backdrop hidden" aria-hidden="true"></div>

    <aside id="side-panel" class="side-panel" aria-label="Controls">
        <div class="side-panel__head">
            <span class="side-panel__title">menu</span>
        </div>

        <nav class="panel-actions">
            <button type="button" id="btn-new" class="panel-btn panel-btn--primary">
                <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>new</span>
            </button>

            <button type="button" id="btn-blank" class="panel-btn">
                <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M4 10h16M4 16h16M10 4v16M16 4v16" stroke="currentColor" stroke-width="1.8"/>
                </svg>
                <span>blank board</span>
            </button>

            <button type="button" id="btn-solve" class="panel-btn">
                <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M8 12.5l2.5 2.5L16 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>solve</span>
            </button>

            <button type="button" id="btn-fix" class="panel-btn">
                <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M10 11v5M14 11v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>remove extras</span>
            </button>

            <button type="button" id="btn-pdf" class="panel-btn">
                <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M8 4h6l4 4v12a1 1 0 01-1 1H8a1 1 0 01-1-1V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M14 4v4h4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>download pdf</span>
            </button>

            <div class="panel-field">
                <button type="button" id="btn-booklet" class="panel-btn panel-btn--grow">
                    <svg class="panel-btn__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <rect x="5" y="4" width="11" height="15" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                        <rect x="8" y="6" width="11" height="15" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M10 10h5M10 13h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <span>booklet</span>
                </button>
                <select id="booklet-count" class="select" aria-label="Booklet pages">
                    <option value="1">1 page</option>
                    <option value="3">3 pages</option>
                    <option value="5">5 pages</option>
                    <option value="10">10 pages</option>
                    <option value="15" selected>15 pages</option>
                </select>
            </div>

            <div class="panel-field">
                <label class="field-label" for="difficulty">
                    <svg class="field-label__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 3l2.4 6.8H21l-5.5 4 2.1 6.8L12 16.6 6.4 20.6l2.1-6.8L3 9.8h6.6L12 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    </svg>
                    difficulty
                </label>
                <select id="difficulty" class="select select--full" aria-label="Difficulty">
                    <option value="normal">normal</option>
                    <option value="mid">mid</option>
                    <option value="easy">easy</option>
                    <option value="veryeasy">very easy</option>
                </select>
            </div>
        </nav>
    </aside>

    <footer class="footer" dir="rtl">
        <span>מנוע Sudoku: נוצר על ידי Tamar</span>
    </footer>

    <script src="js/app.js?v=13"></script>
</body>
</html>
